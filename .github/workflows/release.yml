name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: omp-manager.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: omp-manager
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: omp-manager
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: omp-manager

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/omp-manager dist/
          cd dist
          tar czf omp-manager-${{ matrix.target }}.tar.gz omp-manager
          sha256sum omp-manager-${{ matrix.target }}.tar.gz > omp-manager-${{ matrix.target }}.tar.gz.sha256

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/omp-manager.exe" dist/
          Compress-Archive -Path dist/omp-manager.exe -DestinationPath dist/omp-manager-${{ matrix.target }}.zip
          $hash = (Get-FileHash dist/omp-manager-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  omp-manager-${{ matrix.target }}.zip" | Out-File -Encoding ascii dist/omp-manager-${{ matrix.target }}.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/omp-manager-*

  github-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  crates-io:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  chocolatey:
    needs: github-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: x86_64-pc-windows-msvc
          path: artifacts

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          "VERSION=$ver" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Read checksum
        id: checksum
        shell: pwsh
        run: |
          $sha = (Get-Content artifacts/omp-manager-x86_64-pc-windows-msvc.zip.sha256).Split(" ")[0].Trim()
          "SHA256=$sha" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Create Chocolatey package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $sha256 = "${{ steps.checksum.outputs.SHA256 }}"
          $url = "https://github.com/marlocarlo/omp-manager/releases/download/${{ github.ref_name }}/omp-manager-x86_64-pc-windows-msvc.zip"

          New-Item -ItemType Directory -Force -Path choco/tools

          @"
          <?xml version="1.0" encoding="utf-8"?>
          <package xmlns="http://schemas.chocolatey.org/packaging/2015/06/nuspec.xsd">
            <metadata>
              <id>omp-manager</id>
              <version>$version</version>
              <title>OMP Manager</title>
              <authors>marlocarlo</authors>
              <owners>marlocarlo</owners>
              <projectUrl>https://github.com/marlocarlo/omp-manager</projectUrl>
              <licenseUrl>https://github.com/marlocarlo/omp-manager/blob/master/LICENSE</licenseUrl>
              <requireLicenseAcceptance>false</requireLicenseAcceptance>
              <description>A TUI manager for Oh My Posh - browse themes, install fonts, and configure shells with zero effort.</description>
              <tags>oh-my-posh prompt theme tui terminal</tags>
            </metadata>
          </package>
          "@ | Out-File -Encoding utf8 choco/omp-manager.nuspec

          @"
          `$ErrorActionPreference = 'Stop'
          `$toolsDir = Split-Path -Parent `$MyInvocation.MyCommand.Definition
          `$url = '$url'
          `$checksum = '$sha256'

          Install-ChocolateyZipPackage -PackageName 'omp-manager' ``
            -Url64bit `$url ``
            -UnzipLocation `$toolsDir ``
            -Checksum64 `$checksum ``
            -ChecksumType64 'sha256'
          "@ | Out-File -Encoding utf8 choco/tools/chocolateyinstall.ps1

          choco pack choco/omp-manager.nuspec --output-directory choco

      - name: Push to Chocolatey
        shell: pwsh
        run: |
          choco push choco/omp-manager.${{ steps.version.outputs.VERSION }}.nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }}

  winget:
    needs: github-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: x86_64-pc-windows-msvc
          path: artifacts

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          "VERSION=$ver" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Read checksum
        id: checksum
        shell: pwsh
        run: |
          $sha = (Get-Content artifacts/omp-manager-x86_64-pc-windows-msvc.zip.sha256).Split(" ")[0].Trim()
          "SHA256=$sha" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile wingetcreate.exe

      - name: Submit to winget-pkgs
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $url = "https://github.com/marlocarlo/omp-manager/releases/download/${{ github.ref_name }}/omp-manager-x86_64-pc-windows-msvc.zip"
          ./wingetcreate.exe update marlocarlo.omp-manager --version $version --urls $url --token ${{ secrets.WINGET_GH_PAT }} --submit
