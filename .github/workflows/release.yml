name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            label: Windows x64
            artifact: windows-x64
            ext: .exe
          - target: i686-pc-windows-msvc
            os: windows-latest
            label: Windows x86
            artifact: windows-x86
            ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            label: Windows ARM64 (Snapdragon)
            artifact: windows-arm64
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            label: Linux x64
            artifact: linux-x64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            label: Linux ARM64
            artifact: linux-arm64
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            label: macOS x64 (Intel)
            artifact: macos-x64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            label: macOS ARM64 (Apple Silicon)
            artifact: macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build (Windows — static CRT)
        if: runner.os == 'Windows'
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (non-Windows)
        if: runner.os != 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create release package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag      = "${{ github.ref_name }}"
          $zipName  = "omp-manager-$tag-${{ matrix.artifact }}"
          $releaseDir = "target/${{ matrix.target }}/release"

          $exePath = Join-Path $releaseDir "omp-manager.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "FATAL: Binary not found at '$exePath'"
            Get-ChildItem $releaseDir -Filter "*.exe" | ForEach-Object {
              Write-Output "  Found: $($_.FullName) ($($_.Length) bytes)"
            }
            exit 1
          }

          New-Item -ItemType Directory -Path $zipName -Force | Out-Null
          Copy-Item $exePath     "$zipName/omp-manager.exe" -ErrorAction Stop
          Copy-Item "README.md"  "$zipName/"               -ErrorAction Stop
          Copy-Item "LICENSE"    "$zipName/"               -ErrorAction Stop

          Compress-Archive -Path "$zipName/*" -DestinationPath "$zipName.zip"

          $entries = [System.IO.Compression.ZipFile]::OpenRead("$zipName.zip").Entries.Name
          if ("omp-manager.exe" -notin $entries) {
            Write-Error "FATAL: 'omp-manager.exe' missing from zip!"
            exit 1
          }
          Write-Output "Zip '$zipName.zip' OK. Contents: $($entries -join ', ')"

          $sha256 = (Get-FileHash "$zipName.zip" -Algorithm SHA256).Hash.ToUpper()
          $sha512 = (Get-FileHash "$zipName.zip" -Algorithm SHA512).Hash.ToUpper()
          "$sha256  $zipName.zip" | Out-File -Encoding ascii "$zipName.zip.sha256"
          "$sha512  $zipName.zip" | Out-File -Encoding ascii "$zipName.zip.sha512"
          Write-Output "SHA256: $sha256"
          Write-Output "SHA512: $sha512"

      - name: Create release package (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          tag="${{ github.ref_name }}"
          name="omp-manager-$tag-${{ matrix.artifact }}"
          dir="target/${{ matrix.target }}/release"

          if [ ! -f "$dir/omp-manager" ]; then
            echo "FATAL: $dir/omp-manager not found!"
            ls -la "$dir/" | head -20
            exit 1
          fi

          mkdir -p "$name"
          cp "$dir/omp-manager" "$name/omp-manager"
          chmod +x "$name/omp-manager"
          cp README.md LICENSE "$name/"
          tar czf "$name.tar.gz" "$name"

          sha256=$(sha256sum "$name.tar.gz" | awk '{print $1}' | tr '[:lower:]' '[:upper:]')
          echo "$sha256  $name.tar.gz" > "$name.tar.gz.sha256"
          echo "SHA256: $sha256"
          echo "Archive contents:"; tar tzf "$name.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omp-manager-${{ matrix.artifact }}
          path: |
            omp-manager-*-${{ matrix.artifact }}.zip
            omp-manager-*-${{ matrix.artifact }}.zip.sha256
            omp-manager-*-${{ matrix.artifact }}.zip.sha512
            omp-manager-*-${{ matrix.artifact }}.tar.gz
            omp-manager-*-${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List all release files
        run: find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.sha256" -o -name "*.sha512" \) | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            omp-manager-windows-x64/omp-manager-*-windows-x64.zip
            omp-manager-windows-x64/omp-manager-*-windows-x64.zip.sha256
            omp-manager-windows-x64/omp-manager-*-windows-x64.zip.sha512
            omp-manager-windows-x86/omp-manager-*-windows-x86.zip
            omp-manager-windows-x86/omp-manager-*-windows-x86.zip.sha256
            omp-manager-windows-arm64/omp-manager-*-windows-arm64.zip
            omp-manager-windows-arm64/omp-manager-*-windows-arm64.zip.sha256
            omp-manager-linux-x64/omp-manager-*-linux-x64.tar.gz
            omp-manager-linux-x64/omp-manager-*-linux-x64.tar.gz.sha256
            omp-manager-linux-arm64/omp-manager-*-linux-arm64.tar.gz
            omp-manager-linux-arm64/omp-manager-*-linux-arm64.tar.gz.sha256
            omp-manager-macos-x64/omp-manager-*-macos-x64.tar.gz
            omp-manager-macos-x64/omp-manager-*-macos-x64.tar.gz.sha256
            omp-manager-macos-arm64/omp-manager-*-macos-arm64.tar.gz
            omp-manager-macos-arm64/omp-manager-*-macos-arm64.tar.gz.sha256
          body: |
            ## Oh My Posh Manager ${{ github.ref_name }}

            A TUI that sets up **Oh My Posh** from scratch — no prior knowledge needed.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 | `omp-manager-${{ github.ref_name }}-windows-x64.zip` |
            | Windows x86 | `omp-manager-${{ github.ref_name }}-windows-x86.zip` |
            | Windows ARM64 (Snapdragon) | `omp-manager-${{ github.ref_name }}-windows-arm64.zip` |
            | Linux x64 | `omp-manager-${{ github.ref_name }}-linux-x64.tar.gz` |
            | Linux ARM64 | `omp-manager-${{ github.ref_name }}-linux-arm64.tar.gz` |
            | macOS x64 (Intel) | `omp-manager-${{ github.ref_name }}-macos-x64.tar.gz` |
            | macOS ARM64 (Apple Silicon) | `omp-manager-${{ github.ref_name }}-macos-arm64.tar.gz` |

            ### Installation

            **Via Cargo (all platforms):**
            ```bash
            cargo install omp-manager
            ```

            **Via Scoop (Windows):**
            ```powershell
            scoop bucket add omp-manager https://github.com/marlocarlo/scoop-omp-manager
            scoop install omp-manager
            ```

            **Via Chocolatey (Windows):**
            ```powershell
            choco install omp-manager
            ```

            **Via WinGet (Windows):**
            ```powershell
            winget install marlocarlo.OmpManager
            ```

            **Manual install:** Download the archive for your platform, extract, and put `omp-manager` in your PATH.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crate compiles
        run: cargo check

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-chocolatey:
    name: Publish to Chocolatey
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for GitHub CDN propagation
        shell: pwsh
        run: |
          Write-Output "Waiting 60s for GitHub release CDN propagation..."
          Start-Sleep 60

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag"     >> $env:GITHUB_OUTPUT
          Write-Output "Version: $ver  Tag: $tag"

      - name: Download x64 release zip from GitHub Release
        shell: pwsh
        run: |
          $tag    = "${{ steps.version.outputs.TAG }}"
          $repo   = "${{ github.repository }}"
          $zipUrl = "https://github.com/$repo/releases/download/$tag/omp-manager-$tag-windows-x64.zip"
          Write-Output "Downloading $zipUrl"
          for ($i = 1; $i -le 5; $i++) {
            try {
              Invoke-WebRequest -Uri $zipUrl -OutFile "omp-manager-release.zip" `
                -UseBasicParsing -ErrorAction Stop
              Write-Output "Downloaded successfully."
              break
            } catch {
              if ($i -eq 5) { throw }
              Write-Output "Retry $i / 5 in $($i * 10)s..."
              Start-Sleep ($i * 10)
            }
          }

      - name: Compute checksums
        id: checksum
        shell: pwsh
        run: |
          $sha256 = (Get-FileHash "omp-manager-release.zip" -Algorithm SHA256).Hash.ToUpper()
          $sha512 = (Get-FileHash "omp-manager-release.zip" -Algorithm SHA512).Hash.ToUpper()
          echo "SHA256=$sha256" >> $env:GITHUB_OUTPUT
          echo "SHA512=$sha512" >> $env:GITHUB_OUTPUT
          Write-Output "SHA256: $sha256"
          Write-Output "SHA512: $sha512"

      - name: Verify checksum (re-download and compare)
        shell: pwsh
        run: |
          $tag    = "${{ steps.version.outputs.TAG }}"
          $repo   = "${{ github.repository }}"
          $zipUrl = "https://github.com/$repo/releases/download/$tag/omp-manager-$tag-windows-x64.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile "omp-manager-verify.zip" -UseBasicParsing
          $h1 = (Get-FileHash "omp-manager-release.zip" -Algorithm SHA256).Hash
          $h2 = (Get-FileHash "omp-manager-verify.zip"  -Algorithm SHA256).Hash
          if ($h1 -ne $h2) {
            Write-Error "Checksum mismatch! original=$h1  verified=$h2"
            exit 1
          }
          Write-Output "Checksum verified: $h1"

      - name: Generate chocolateyinstall.ps1
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.VERSION }}"
          $tag  = "${{ steps.version.outputs.TAG }}"
          $hash = "${{ steps.checksum.outputs.SHA256 }}"
          $repo = "${{ github.repository }}"
          $url  = "https://github.com/$repo/releases/download/$tag/omp-manager-$tag-windows-x64.zip"

          $script = @"
          `$ErrorActionPreference = 'Stop'
          `$toolsDir = Split-Path -Parent `$MyInvocation.MyCommand.Definition

          `$packageArgs = @{
            packageName    = `$env:ChocolateyPackageName
            unzipLocation  = `$toolsDir
            url64bit       = '$url'
            checksum64     = '$hash'
            checksumType64 = 'sha256'
          }

          Install-ChocolateyZipPackage @packageArgs

          Install-BinFile -Name 'omp-manager' -Path (Join-Path `$toolsDir 'omp-manager.exe')
          "@

          $script = ($script -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"

          New-Item -ItemType Directory -Path "choco-pkg/tools" -Force | Out-Null
          Set-Content -Path "choco-pkg/tools/chocolateyinstall.ps1" -Value $script -NoNewline
          Write-Output "Generated chocolateyinstall.ps1 with checksum $hash"

      - name: Generate chocolateyuninstall.ps1
        shell: pwsh
        run: |
          $script = "Uninstall-BinFile -Name 'omp-manager'"
          Set-Content -Path "choco-pkg/tools/chocolateyuninstall.ps1" -Value $script -NoNewline

      - name: Generate VERIFICATION.txt
        shell: pwsh
        run: |
          $tag     = "${{ steps.version.outputs.TAG }}"
          $hash256 = "${{ steps.checksum.outputs.SHA256 }}"
          $hash512 = "${{ steps.checksum.outputs.SHA512 }}"
          $repo    = "${{ github.repository }}"
          $url     = "https://github.com/$repo/releases/download/$tag/omp-manager-$tag-windows-x64.zip"

          $verification = @"
          VERIFICATION
          ============

          Verification is intended to assist the Chocolatey moderators and community
          in verifying that this package's contents are trustworthy.

          Package: omp-manager
          Project: https://github.com/$repo
          License: MIT (https://github.com/$repo/blob/master/LICENSE)

          Download URL:
            $url

          Checksums:
            SHA256: $hash256
            SHA512: $hash512

          Verification steps:
            1. Download the zip from the URL above
            2. Compute SHA256: Get-FileHash <file> -Algorithm SHA256
            3. Compute SHA512: Get-FileHash <file> -Algorithm SHA512
            4. Compare with the checksums listed above

          The binary is built from source via GitHub Actions (static CRT, no VC runtime DLLs required):
            https://github.com/$repo/actions
          "@

          $verification = ($verification -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          Set-Content -Path "choco-pkg/tools/VERIFICATION.txt" -Value $verification -NoNewline
          Write-Output "Generated VERIFICATION.txt"

      - name: Generate nuspec
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.VERSION }}"
          $repo = "${{ github.repository }}"

          $nuspec = @"
          <?xml version="1.0" encoding="utf-8"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2015/06/nuspec.xsd">
            <metadata>
              <id>omp-manager</id>
              <version>$ver</version>
              <title>Oh My Posh Manager</title>
              <authors>marlocarlo</authors>
              <owners>marlocarlo</owners>
              <licenseUrl>https://github.com/$repo/blob/master/LICENSE</licenseUrl>
              <projectUrl>https://github.com/$repo</projectUrl>
              <iconUrl>https://raw.githubusercontent.com/$repo/master/screenshot.png</iconUrl>
              <requireLicenseAcceptance>false</requireLicenseAcceptance>
              <description>A TUI manager for Oh My Posh - browse themes, install Nerd Fonts, and configure shells with zero effort. No prior knowledge needed: the app detects what is missing and walks you through everything. Built with Rust and Ratatui. Statically compiled - no VC runtime required.</description>
              <summary>TUI manager for Oh My Posh - themes, fonts, and shell config in one app</summary>
              <releaseNotes>https://github.com/$repo/releases</releaseNotes>
              <tags>oh-my-posh omp prompt theme tui terminal cli nerd-font shell powershell</tags>
              <packageSourceUrl>https://github.com/$repo</packageSourceUrl>
              <docsUrl>https://github.com/$repo#readme</docsUrl>
              <bugTrackerUrl>https://github.com/$repo/issues</bugTrackerUrl>
            </metadata>
            <files>
              <file src="tools\**" target="tools" />
            </files>
          </package>
          "@

          $nuspec = ($nuspec -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          Set-Content -Path "choco-pkg/omp-manager.nuspec" -Value $nuspec -NoNewline
          Write-Output "Generated omp-manager.nuspec v$ver"

      - name: Pack Chocolatey package
        shell: pwsh
        run: |
          cd choco-pkg
          choco pack omp-manager.nuspec
          $nupkg = (Get-ChildItem *.nupkg | Select-Object -First 1).Name
          if (-not $nupkg) { Write-Error "No .nupkg produced!"; exit 1 }
          Write-Output "Packed: $nupkg"

      - name: Push to Chocolatey
        shell: pwsh
        run: |
          cd choco-pkg
          $nupkg = (Get-ChildItem *.nupkg | Select-Object -First 1).Name
          choco push $nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }}
          Write-Output "Successfully pushed $nupkg to Chocolatey"

  publish-scoop:
    name: Publish to Scoop Bucket
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Wait for GitHub CDN propagation
        run: |
          echo "Waiting 60s for GitHub release CDN propagation..."
          sleep 60

      - name: Extract version from tag
        id: version
        run: |
          tag="${{ github.ref_name }}"
          ver="${tag#v}"
          echo "VERSION=$ver" >> $GITHUB_OUTPUT
          echo "TAG=$tag"     >> $GITHUB_OUTPUT

      - name: Download Windows zips and compute SHA256
        id: hashes
        run: |
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          base="https://github.com/$repo/releases/download/$tag"

          for arch in x64 x86 arm64; do
            url="$base/omp-manager-$tag-windows-$arch.zip"
            echo "Downloading $url"
            for i in 1 2 3 4 5; do
              if curl -fsSL -o "installer-$arch.zip" "$url"; then break; fi
              echo "Retry $i / 5..."; sleep $((i * 10))
            done
            hash=$(sha256sum "installer-$arch.zip" | awk '{print $1}' | tr '[:lower:]' '[:upper:]')
            upper=$(echo "$arch" | tr '[:lower:]' '[:upper:]')
            echo "SHA256_${upper}=$hash" >> $GITHUB_OUTPUT
            echo "  $arch: $hash"
          done

      - name: Clone scoop bucket repo
        run: |
          git clone https://x-access-token:${{ secrets.WINGET_PAT }}@github.com/marlocarlo/scoop-omp-manager.git scoop-bucket

      - name: Update scoop manifest
        run: |
          ver="${{ steps.version.outputs.VERSION }}"
          tag="${{ steps.version.outputs.TAG }}"
          sha64="${{ steps.hashes.outputs.SHA256_X64 }}"
          sha86="${{ steps.hashes.outputs.SHA256_X86 }}"
          shaarm="${{ steps.hashes.outputs.SHA256_ARM64 }}"
          repo="${{ github.repository }}"
          base="https://github.com/$repo/releases/download/$tag"

          mkdir -p scoop-bucket/bucket

          cat > scoop-bucket/bucket/omp-manager.json << MANIFEST
          {
              "version": "$ver",
              "description": "A TUI manager for Oh My Posh - browse themes, install Nerd Fonts, and configure shells with zero effort",
              "homepage": "https://github.com/marlocarlo/omp-manager",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "$base/omp-manager-$tag-windows-x64.zip",
                      "hash": "$sha64"
                  },
                  "32bit": {
                      "url": "$base/omp-manager-$tag-windows-x86.zip",
                      "hash": "$sha86"
                  },
                  "arm64": {
                      "url": "$base/omp-manager-$tag-windows-arm64.zip",
                      "hash": "$shaarm"
                  }
              },
              "bin": ["omp-manager.exe"],
              "checkver": {
                  "github": "https://github.com/marlocarlo/omp-manager"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/marlocarlo/omp-manager/releases/download/v\$version/omp-manager-v\$version-windows-x64.zip"
                      },
                      "32bit": {
                          "url": "https://github.com/marlocarlo/omp-manager/releases/download/v\$version/omp-manager-v\$version-windows-x86.zip"
                      },
                      "arm64": {
                          "url": "https://github.com/marlocarlo/omp-manager/releases/download/v\$version/omp-manager-v\$version-windows-arm64.zip"
                      }
                  }
              }
          }
          MANIFEST

          python3 -c "
          import json
          with open('scoop-bucket/bucket/omp-manager.json') as f:
              data = json.load(f)
          with open('scoop-bucket/bucket/omp-manager.json', 'w', newline='\n') as f:
              json.dump(data, f, indent=4)
              f.write('\n')
          "

      - name: Push updated manifest to scoop bucket
        run: |
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/omp-manager.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update omp-manager to ${{ steps.version.outputs.VERSION }}"
          git push

  publish-winget:
    name: Publish to WinGet
    needs: release
    runs-on: windows-latest
    steps:
      - name: Wait for GitHub CDN propagation
        shell: pwsh
        run: |
          Write-Output "Waiting 90s for GitHub release CDN propagation..."
          Start-Sleep 90

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag"     >> $env:GITHUB_OUTPUT
          Write-Output "Version: $ver  Tag: $tag"

      - name: Download Windows zips and compute SHA256
        id: hashes
        shell: pwsh
        run: |
          $tag  = "${{ steps.version.outputs.TAG }}"
          $repo = "${{ github.repository }}"
          $base = "https://github.com/$repo/releases/download/$tag"

          $archs = @(
            @{ label = "x64";   artifact = "windows-x64"  },
            @{ label = "x86";   artifact = "windows-x86"  },
            @{ label = "arm64"; artifact = "windows-arm64" }
          )

          foreach ($a in $archs) {
            $url  = "$base/omp-manager-$tag-$($a.artifact).zip"
            $file = "installer-$($a.label).zip"
            Write-Output "Downloading $url ..."
            for ($i = 1; $i -le 5; $i++) {
              try {
                Invoke-WebRequest -Uri $url -OutFile $file -UseBasicParsing -ErrorAction Stop
                break
              } catch {
                if ($i -eq 5) { throw }
                Write-Output "Retry $i / 5 in $($i * 10)s..."
                Start-Sleep ($i * 10)
              }
            }
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToUpper()
            Write-Output "  SHA256 ($($a.label)): $hash"
            echo "SHA256_$($a.label.ToUpper())=$hash" >> $env:GITHUB_OUTPUT
          }

      - name: Verify SHA256 checksums (re-download and compare)
        shell: pwsh
        run: |
          $tag  = "${{ steps.version.outputs.TAG }}"
          $repo = "${{ github.repository }}"
          $base = "https://github.com/$repo/releases/download/$tag"
          foreach ($arch in @("x64", "x86", "arm64")) {
            $url    = "$base/omp-manager-$tag-windows-$arch.zip"
            $orig   = "installer-$arch.zip"
            $verify = "verify-$arch.zip"
            Invoke-WebRequest -Uri $url -OutFile $verify -UseBasicParsing
            $h1 = (Get-FileHash $orig   -Algorithm SHA256).Hash
            $h2 = (Get-FileHash $verify -Algorithm SHA256).Hash
            if ($h1 -ne $h2) {
              Write-Error "SHA256 mismatch for $arch! orig=$h1  verify=$h2"
              exit 1
            }
            Write-Output "Verified $arch : $h1"
          }

      - name: Download wingetcreate
        shell: pwsh
        run: |
          $wgcPath = "$env:TEMP\wingetcreate.exe"
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile $wgcPath -UseBasicParsing
          echo "WGC_PATH=$wgcPath" >> $env:GITHUB_ENV
          Write-Output "Downloaded wingetcreate to $wgcPath"

      - name: Create WinGet manifests
        shell: pwsh
        run: |
          $ver    = "${{ steps.version.outputs.VERSION }}"
          $tag    = "${{ steps.version.outputs.TAG }}"
          $repo   = "${{ github.repository }}"
          $base   = "https://github.com/$repo/releases/download/$tag"
          $pkgId  = "marlocarlo.OmpManager"
          $outDir = "winget-manifests"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $sha64  = "${{ steps.hashes.outputs.SHA256_X64 }}"
          $sha86  = "${{ steps.hashes.outputs.SHA256_X86 }}"
          $shaArm = "${{ steps.hashes.outputs.SHA256_ARM64 }}"

          # ---- Version manifest ----
          $versionYaml = @"
          PackageIdentifier: $pkgId
          PackageVersion: $ver
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.9.0
          "@
          $versionYaml = ($versionYaml -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          Set-Content "$outDir/$pkgId.yaml" -Value $versionYaml -Encoding utf8NoBOM -NoNewline

          # ---- Installer manifest ----
          $installerYaml = @"
          PackageIdentifier: $pkgId
          PackageVersion: $ver
          Platform:
          - Windows.Desktop
          MinimumOSVersion: 10.0.0.0
          InstallerType: zip
          NestedInstallerType: portable
          NestedInstallerFiles:
          - RelativeFilePath: omp-manager.exe
            PortableCommandAlias: omp-manager
          Installers:
          - Architecture: x64
            InstallerUrl: $base/omp-manager-$tag-windows-x64.zip
            InstallerSha256: $sha64
          - Architecture: x86
            InstallerUrl: $base/omp-manager-$tag-windows-x86.zip
            InstallerSha256: $sha86
          - Architecture: arm64
            InstallerUrl: $base/omp-manager-$tag-windows-arm64.zip
            InstallerSha256: $shaArm
          ManifestType: installer
          ManifestVersion: 1.9.0
          "@
          $installerYaml = ($installerYaml -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          Set-Content "$outDir/$pkgId.installer.yaml" -Value $installerYaml -Encoding utf8NoBOM -NoNewline

          # ---- Default locale manifest ----
          $localeYaml = @"
          PackageIdentifier: $pkgId
          PackageVersion: $ver
          PackageLocale: en-US
          Publisher: marlocarlo
          PublisherUrl: https://github.com/marlocarlo
          PublisherSupportUrl: https://github.com/marlocarlo/omp-manager/issues
          PackageName: Oh My Posh Manager
          PackageUrl: https://github.com/marlocarlo/omp-manager
          License: MIT
          LicenseUrl: https://github.com/marlocarlo/omp-manager/blob/master/LICENSE
          Copyright: Copyright (c) marlocarlo
          ShortDescription: A TUI manager for Oh My Posh - browse themes, install fonts, configure shells
          Description: |-
            Oh My Posh Manager is a terminal UI that sets up Oh My Posh from scratch with
            no prior knowledge needed. It detects what is missing and walks you through
            installing Oh My Posh, picking a Nerd Font, previewing and applying a theme,
            and configuring your shells. Built with Rust and Ratatui. Statically compiled.
          Moniker: omp-manager
          Tags:
          - oh-my-posh
          - omp
          - prompt
          - terminal
          - tui
          - theme
          - nerd-font
          - shell
          - powershell
          ReleaseNotesUrl: https://github.com/marlocarlo/omp-manager/releases/tag/$tag
          ManifestType: defaultLocale
          ManifestVersion: 1.9.0
          "@
          $localeYaml = ($localeYaml -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          Set-Content "$outDir/$pkgId.locale.en-US.yaml" -Value $localeYaml -Encoding utf8NoBOM -NoNewline

          Write-Output "Manifests created:"
          Get-ChildItem $outDir | ForEach-Object {
            Write-Output "--- $($_.Name) ---"
            Get-Content $_.FullName | ForEach-Object { Write-Output "  $_" }
          }

      - name: Submit manifests to WinGet
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.VERSION }}"
          $tag  = "${{ steps.version.outputs.TAG }}"
          $repo = "${{ github.repository }}"
          $base = "https://github.com/$repo/releases/download/$tag"

          & $env:WGC_PATH update "marlocarlo.OmpManager" `
            --version $ver `
            --urls "$base/omp-manager-$tag-windows-x64.zip" `
                   "$base/omp-manager-$tag-windows-x86.zip" `
                   "$base/omp-manager-$tag-windows-arm64.zip" `
            --token "${{ secrets.WINGET_PAT }}" --submit 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Output "WinGet updated via 'update' command."
            exit 0
          }

          Write-Output "Package not found in winget-pkgs, submitting full manifests..."
          & $env:WGC_PATH submit "winget-manifests" `
            --token "${{ secrets.WINGET_PAT }}" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "wingetcreate submit failed (exit $LASTEXITCODE)"
            exit 1
          }
          Write-Output "PR submitted to microsoft/winget-pkgs!"
          Write-Output "Track at: https://github.com/microsoft/winget-pkgs/pulls?q=is%3Apr+marlocarlo.OmpManager"
